site_name: NSClient++
repo_url: https://github.com/mickem/nscp
repo_name: NSClient++

theme:
  name: material
  logo: assets/nsclient-logo.png
  icon:
    repo: fontawesome/brands/github-alt

  features:
    - navigation.tabs
    - toc.follow
    - toc.integrate
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode


nav:
  - Home:
    - Welcome: index.md
    - About NSClient++: nsclient.md
  - News: news/index.md
  - Download: https://github.com/mickem/nscp/releases
  - Documentation:
    - Home: docs/index.md
    - Quick Start: docs/quick-start.md
    - Concepts:
        - How NSClient++ Works: docs/concepts/index.md
        - Checks In Depth: docs/concepts/checks.md
        - Settings: docs/concepts/settings.md
        - Permissions: docs/concepts/permissions.md
    - Setup:
